<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kureo Pre-Order</title>
     <link rel="stylesheet" href="my.css">
</head>
<body>
<div class="light"></div>



<section class="order-form">
    <form action="https://myorders.000webhostapp.com/submit_order.php" method="POST">
    <h2>Order now Your Kureo Collection</h2>

    <form action="submit_order.php" method="POST">
        <!-- Name -->
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required placeholder="Name">

        <!-- Email -->
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="example@email.com">

        <!-- Phone -->
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" required placeholder="+63 9">

        <!-- Item Selection -->
        <label for="item">Select Item</label>
        <select id="item" name="item" required>
            <option value="">--Choose an item--</option>
            <option value="Black_T">Kureo Black Tee - ₱500</option>
            <option value="White_T">Kureo White Tee - ₱500</option>
            <option value="Gray_T">Kureo Gray Tee - ₱500</option>
            <option value="Pink_H">Kureo Pink Hoodie - ₱1000</option>
            <option value="Blue_H">Kureo Blue Hoodie - ₱1000</option>
            <option value="Beige_H">Kureo Beige Hoodie - ₱1000</option>
        </select>
        <label for="size">Select Size</label>
        <select id="size" name="size" required>
            <option value="">--Sizes--</option>
            <option value="Small">Small</option>
            <option value="Mediun">Medium</option>
            <option value="Large">Large</option>
            
        </select>

        <!-- Quantity -->
        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" name="quantity" min="1" value="1" required>

        <!-- Address -->
        <label for="address">Shipping Address</label>
        <textarea id="address" name="address" rows="3" placeholder="Street, City, Province, Country" required></textarea>

        <!-- Submit -->
        
  <button type="submit" class=" " onclick="window.location.href='done.html'">Order Now</button>


        </form>


   


<script>
document.addEventListener("mousemove", (e) => {
    const light = document.querySelector(".light");
    light.style.left = e.clientX + "px";
    light.style.top = e.clientY + "px";
});


</script>
</body>
</html>
