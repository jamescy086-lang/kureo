<!DOCTYPE html>
<html lang="en">
<head>

    <title>Kureo</title>
    <link rel="stylesheet" href="my.css">
</head>

<body>
    <div class="light"></div>

    <h1 class="zoom">
       
 <a  onclick="window.location.href='shop.html'">Welcome to <span>Kureo's Collection</span></a>

<script>
document.addEventListener("mousemove", (e) => {
    const light = document.querySelector(".light");

    light.style.top = e.clientY + "px";
});
</script>

</body>
